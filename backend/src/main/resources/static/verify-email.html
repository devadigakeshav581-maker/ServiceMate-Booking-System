<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ServiceMate – Email Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#080b14; --panel:#0e1220; --accent:#3b82f6; --text:#e8eaf6; --muted:#5a6482; --border:#1e2438; }
  body { background:var(--bg); color:var(--text); font-family:'Epilogue',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:40px; width:400px; max-width:90%; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
  h2 { font-family:'Syne',sans-serif; margin-bottom:16px; font-size:1.5rem; }
  p { color:var(--muted); line-height:1.6; margin-bottom:24px; }
  .btn { display:inline-block; background:var(--accent); color:#fff; text-decoration:none; padding:12px 24px; border-radius:10px; font-weight:600; font-family:'Syne',sans-serif; }
  .spinner { border:3px solid rgba(255,255,255,0.1); border-top:3px solid var(--accent); border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite; margin:0 auto 20px; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div id="loader">
    <div class="spinner"></div>
    <h2>Verifying...</h2>
    <p>Please wait while we verify your email address.</p>
  </div>
  
  <div id="success" style="display:none">
    <div style="font-size:3rem;margin-bottom:16px">🎉</div>
    <h2>Email Verified!</h2>
    <p>Your account has been successfully verified. You can now login to ServiceMate.</p>
    <a href="login.html" class="btn">Go to Login</a>
  </div>

  <div id="error" style="display:none">
    <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
    <h2>Verification Failed</h2>
    <p id="errMsg">The token is invalid or expired.</p>
    <a href="login.html" class="btn">Back to Login</a>
  </div>
</div>

<script src="api.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if(!token) { showStatus('error', 'Missing verification token.'); return; }

    try {
      await AuthAPI.verify(token);
      showStatus('success');
    } catch(err) {
      showStatus('error', err.message || 'Token expired or invalid');
    }
  });

  function showStatus(type, msg) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById(type).style.display = 'block';
    if(msg && type === 'error') document.getElementById('errMsg').textContent = msg;
  }
</script>
</body>
</html>
