<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ServiceMate – Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#080b14; --panel:#0e1220; --accent:#3b82f6; --text:#e8eaf6; --muted:#5a6482; --border:#1e2438; --input-bg:#131826; --error:#f87171; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Epilogue',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:40px; width:400px; max-width:90%; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
  .logo { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; margin-bottom:24px; text-align:center; }
  .logo span { color:var(--accent); }
  .title { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:700; margin-bottom:8px; text-align:center; }
  .sub { font-size:.9rem; color:var(--muted); text-align:center; margin-bottom:32px; line-height:1.5; }
  .field { margin-bottom:20px; }
  .input { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:10px; padding:12px; color:var(--text); outline:none; font-family:inherit; }
  .input:focus { border-color:var(--accent); }
  .btn { width:100%; background:var(--accent); color:#fff; border:none; padding:12px; border-radius:10px; font-weight:600; cursor:pointer; font-family:'Syne',sans-serif; transition:.2s; }
  .btn:hover { background:#2563eb; }
  .btn:disabled { opacity:0.7; cursor:not-allowed; }
  .links { margin-top:20px; text-align:center; font-size:.85rem; }
  .links a { color:var(--muted); text-decoration:none; transition:.2s; }
  .links a:hover { color:var(--accent); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Service<span>Mate</span></div>
  <div class="title">Forgot Password?</div>
  <div class="sub">Enter your email address and we'll send you a link to reset your password.</div>
  
  <div class="field">
    <input type="email" class="input" id="email" placeholder="name@example.com" />
  </div>
  
  <button class="btn" id="submitBtn" onclick="handleForgot()">Send Reset Link</button>
  
  <div class="links">
    <a href="login.html">← Back to Login</a>
  </div>
</div>

<script src="api.js"></script>
<script>
  async function handleForgot() {
    const email = document.getElementById('email').value.trim();
    if(!email) return UI.toast('Please enter your email', 'warning');
    
    const btn = document.getElementById('submitBtn');
    UI.setLoading(btn, true);
    
    try {
      await AuthAPI.forgotPassword(email);
      // Since we are mocking email sending to console, we show success regardless
      UI.toast('Reset link generated! Check server console.', 'success');
      setTimeout(() => window.location.href = 'login.html', 3000);
    } catch(err) {
      console.error(err);
      UI.toast('Request failed. Please try again.', 'error');
    } finally {
      UI.setLoading(btn, false);
    }
  }
</script>
</body>
</html>
