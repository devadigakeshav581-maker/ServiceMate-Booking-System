version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: servicemate-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: servicemate
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: servicemate-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

  backend:
    build: .
    container_name: servicemate-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: backend/frontend.Dockerfile
    container_name: servicemate-ui
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: