# Spring Boot Application Properties
spring.application.name=ServiceMate
spring.main.allow-bean-definition-overriding=true

# Server Configuration
server.port=8443
server.http.port=8080

# SSL/HTTPS Configuration (for local development with self-signed certificate)
#server.ssl.enabled=${SSL_ENABLED:true}
#server.ssl.key-store-type=PKCS12
#server.ssl.key-store=${KEYSTORE_PATH:classpath:keystore/servicemate.p12}
#server.ssl.key-store-password=${KEYSTORE_PASSWORD:password}
#server.ssl.key-alias=servicemate

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/servicemate
spring.datasource.username=root
spring.datasource.password=Root@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:my_secret_key_123456789_change_this_in_production}
jwt.expiration=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.com.servicemate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.name=logs/servicemate.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Email (Gmail SMTP) Configuration - Use environment variables for production
# IMPORTANT: For Gmail, you must use an "App Password", not your regular password.
# See: https://support.google.com/accounts/answer/185833
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=keshavisdevadiga07@gmail.com
spring.mail.password=dwiz cgdc jmjp knfw
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=when_authorized
