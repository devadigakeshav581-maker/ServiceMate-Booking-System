version: '3.8'

services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: servicemate-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # Use environment variables
      MYSQL_DATABASE: servicemate
    volumes:
      - ./database/servicemate_schema.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend Service
  backend:
    build: ./backend
    container_name: servicemate-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_PASSWORD=${DB_PASSWORD} # Pass password to backend
      - JWT_SECRET=${JWT_SECRET}   # Pass JWT secret to backend
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/servicemate # Override URL to use Docker networking

  # React Frontend Service
  frontend:
    build: ./frontend_react
    container_name: servicemate-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8080
    # Mount volume for hot-reloading during development
    volumes:
      - ./frontend_react:/app
      - /app/node_modules

volumes:
  mysql_data: