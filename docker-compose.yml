services:
  db:
    image: mysql:8.0
    container_name: servicemate-db
    restart: always
    environment:
      MYSQL_DATABASE: servicemate
      MYSQL_ROOT_PASSWORD: Root@2026
    volumes:
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-pRoot@2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: servicemate-app
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/servicemate?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_PASSWORD=Root@2026
      - SPRING_MAIL_USERNAME=keshavisdevadiga07@gmail.com
      - SPRING_MAIL_PASSWORD=dwiz cgdc jmjp knfw
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - CORS_ALLOWED_ORIGINS=http://localhost

  frontend:
    build:
      context: .
      dockerfile: backend/frontend.Dockerfile
    container_name: servicemate-ui
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend